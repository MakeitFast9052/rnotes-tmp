name: Build Rnotes

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install dependencies
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build project
        run: cargo tauri build

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          brew install \
            webkit2gtk \
            gtk+3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install dependencies
        run: rustup target add aarch64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build project
        run: cargo tauri build

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          choco install -y \
            webkit2gtk \
            gtk3 \
            openssl

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install dependencies
        run: rustup target add x86_64-pc-windows-msvc
        shell: bash

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build project
        run: cargo tauri build
